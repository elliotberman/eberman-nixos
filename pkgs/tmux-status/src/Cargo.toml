[package]
name = "tmux-status"
version = "0.1.0"
edition = "2021"

[dependencies]
procfs = { version = "0.17", default-features = false }
serde = { version = "1", features = ["derive"] }
bincode = { version = "2", features = ["serde"] }
libc = "0.2"

[profile.release]
opt-level = "z"
lto = true
panic = "abort"
codegen-units = 1
strip = true
